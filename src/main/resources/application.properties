## Server Configuration
#server.port=${PORT:8080}

spring.application.name=ishop
server.port=${PORT:8080}
server.forward-headers-strategy=framework
# Database Configuration (ប្រើ Environment Variables ដើម្បីឱ្យដើរទាំងលើ Mac និង Railway)
spring.datasource.url=jdbc:mysql://mysql-db:3306/ishop_db?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:12345}
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect